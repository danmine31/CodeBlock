<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <title>CodeBlocks</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="app-container">
        <div class="toolbar">
            <h3>Блоки</h3>
            <div class="block-template variable" draggable="true" data-block-type="declare">Объявить переменные</div>
            <div class="block-template" draggable="true" data-block-type="assign">Присвоить значение</div>
            <div class="block-template" draggable="true" data-block-type="if">Условие IF</div>
            <div class="block-template" draggable="true" data-block-type="declare-array">Объявить массив</div>
            <div class="block-template" draggable="true" data-block-type="array-assign">Присвоить элементу массива</div>
            <div class="block-template while" draggable="true" data-block-type="while">Цикл WHILE</div>
            <div class="block-template for" draggable="true" data-block-type="for">Цикл FOR</div>
            <hr/>
            <button id="run-button">Выполнить</button>
            <div class="toolbar-buttons-row">
                <button id="export-btn">Экспорт (JSON)</button>
                <label for="import-input" style="cursor: pointer; border: 1px solid #ccc; padding: 5px;">Импорт (JSON)</label>
                <input type="file" id="import-input" accept=".json" style="display: none;">
                <button id="clear-btn" title="Очистить всё">🗑</button>
            </div>
        </div>
        <div class="canvas-wrapper">
             <h3 class="workspace">Рабочая область</h3>
            <div class="canvas"></div>
             <h3>Вывод</h3>
            <div class="output"></div>
        </div>
    </div>
<script type="module" src="main.js"></script>
</body>
</html>
